<!-- Seção "Vamos trabalhar juntos" -->
<section id="contact" class="py-16 bg-gray-50">
  <div class="max-w-4xl mx-auto text-center">
    <h2 class="text-3xl font-bold mb-4">Vamos trabalhar juntos</h2>
    <p class="text-gray-600 mb-8">
      Entre em contato comigo pelas redes abaixo ou envie uma mensagem pelo formulário.
    </p>

    <!-- Redes -->
    <div class="flex justify-center gap-6 mb-8">
      <a href="https://www.linkedin.com/in/lucasbispo703/" target="_blank" class="text-blue-600 hover:text-blue-800 text-xl">
        <i class="fab fa-linkedin"></i> LinkedIn
      </a>
      <a href="https://www.behance.net/lucasbispo703" target="_blank" class="text-blue-600 hover:text-blue-800 text-xl">
        <i class="fab fa-behance"></i> Behance
      </a>
    </div>

    <!-- Formulário -->
    <form id="contact-form" class="bg-white shadow-md rounded-lg p-8 max-w-lg mx-auto">
      <div class="mb-4">
        <input type="text" name="name" id="name" placeholder="Seu nome" class="w-full p-3 border rounded-lg" required>
      </div>
      <div class="mb-4">
        <input type="email" name="email" id="email" placeholder="Seu email" class="w-full p-3 border rounded-lg" required>
      </div>
      <div class="mb-4">
        <input type="text" name="title" id="title" placeholder="Assunto" class="w-full p-3 border rounded-lg" required>
      </div>
      <div class="mb-4">
        <textarea name="message" id="message" placeholder="Sua mensagem" rows="5" class="w-full p-3 border rounded-lg" required></textarea>
      </div>
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg w-full">
        Enviar mensagem
      </button>
    </form>
  </div>
</section>

<!-- Importando EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  // Inicializa EmailJS
  (function(){
    emailjs.init("SNa-heMCl1Hm97lpF"); // sua Public Key
  })();

  // Lógica do formulário
  document.getElementById("contact-form").addEventListener("submit", function(event) {
    event.preventDefault();

    const templateParams = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      title: document.getElementById("title").value,
      message: document.getElementById("message").value,
      from_email: document.getElementById("email").value // usado no auto-reply
    };

    // Envia para você (Hotmail)
    emailjs.send("service_default", "template_ev8j6gu", templateParams)
      .then(function(response) {
        console.log("Contato enviado com sucesso!", response.status, response.text);

        // Envia resposta automática para o visitante
        emailjs.send("service_default", "template_nrkcxg7", templateParams)
          .then(function() {
            alert("Mensagem enviada com sucesso! Você receberá uma resposta em breve.");
            document.getElementById("contact-form").reset();
          }, function(error) {
            console.error("Erro ao enviar auto-reply:", error);
            alert("Sua mensagem foi enviada, mas houve um erro ao confirmar o recebimento.");
          });

      }, function(error) {
        console.error("Erro ao enviar contato:", error);
        alert("Erro ao enviar mensagem. Tente novamente.");
      });
  });
</script>
